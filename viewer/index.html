<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris MCP Replay Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }

    .container { max-width: 800px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 24px; margin-bottom: 16px; }

    .game-area { display: flex; gap: 24px; align-items: flex-start; }

    .board-container { position: relative; }
    canvas { border: 2px solid #334155; border-radius: 4px; }

    .sidebar { display: flex; flex-direction: column; gap: 16px; min-width: 200px; }

    .info-panel {
      background: #1e293b;
      border-radius: 8px;
      padding: 16px;
    }
    .info-panel h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 8px; }
    .info-value { font-size: 24px; font-weight: bold; font-family: 'JetBrains Mono', monospace; }

    .controls {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .controls button {
      background: #334155; border: 1px solid #475569; color: #e2e8f0;
      padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px;
    }
    .controls button:hover { background: #475569; }
    .controls button:disabled { opacity: 0.4; cursor: not-allowed; }

    .progress {
      display: flex; align-items: center; gap: 12px; margin-top: 8px;
    }
    .progress input[type="range"] { flex: 1; }
    .progress span { font-family: monospace; font-size: 13px; color: #94a3b8; min-width: 80px; }

    .speed-control { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #94a3b8; }
    .speed-control select {
      background: #334155; border: 1px solid #475569; color: #e2e8f0;
      padding: 4px 8px; border-radius: 4px;
    }

    .file-drop {
      border: 2px dashed #334155; border-radius: 8px; padding: 40px;
      text-align: center; color: #64748b; cursor: pointer;
    }
    .file-drop:hover { border-color: #57dda9; color: #57dda9; }
    .file-drop.active { border-color: #57dda9; background: rgba(87, 221, 169, 0.05); }

    .piece-colors {
      --I: #00d4ff;
      --O: #ffd700;
      --T: #a855f7;
      --S: #22c55e;
      --Z: #ef4444;
      --J: #3b82f6;
      --L: #f97316;
    }

    .reasoning-panel {
      background: #1e293b;
      border-radius: 8px;
      padding: 16px;
      margin-top: 12px;
    }
    .reasoning-panel h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 8px; }
    .reasoning-text {
      font-size: 13px; line-height: 1.5; color: #cbd5e1;
      max-height: 120px; overflow-y: auto;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .reasoning-text.empty { color: #475569; font-style: italic; }

    .metadata { font-size: 12px; color: #64748b; margin-top: 8px; }
  </style>
</head>
<body class="piece-colors">
  <div class="container">
    <h1>Tetris MCP Replay Viewer</h1>

    <div id="drop-zone" class="file-drop" style="display:block;">
      Drop a game JSON file here, or click to load
      <input type="file" id="file-input" accept=".json" style="display:none;">
    </div>

    <div id="game-ui" style="display:none;">
      <div class="game-area">
        <div class="board-container">
          <canvas id="board-canvas"></canvas>
        </div>
        <div class="sidebar">
          <div class="info-panel">
            <h3>Score</h3>
            <div class="info-value" id="score">0</div>
          </div>
          <div class="info-panel">
            <h3>Lines</h3>
            <div class="info-value" id="lines">0</div>
          </div>
          <div class="info-panel">
            <h3>Next</h3>
            <canvas id="next-canvas" width="80" height="80"></canvas>
          </div>
          <div class="info-panel">
            <h3>Status</h3>
            <div id="status" style="font-size: 14px;">Ready</div>
          </div>
        </div>
      </div>

      <div class="progress">
        <input type="range" id="scrubber" min="0" max="0" value="0">
        <span id="move-counter">0 / 0</span>
      </div>

      <div style="display: flex; gap: 16px; align-items: center; margin-top: 12px;">
        <div class="controls">
          <button id="btn-reset">Reset</button>
          <button id="btn-prev">Prev</button>
          <button id="btn-play">Play</button>
          <button id="btn-next">Next</button>
          <button id="btn-end">End</button>
        </div>
        <div class="speed-control">
          <label for="speed">Speed:</label>
          <select id="speed">
            <option value="1000">0.5x</option>
            <option value="500">1x</option>
            <option value="250" selected>2x</option>
            <option value="100">5x</option>
            <option value="50">10x</option>
          </select>
        </div>
      </div>

      <div class="reasoning-panel">
        <h3>Claude's Reasoning</h3>
        <div class="reasoning-text" id="reasoning"></div>
      </div>

      <div style="display: flex; gap: 8px; align-items: center; margin-top: 12px;">
        <div class="metadata" id="metadata" style="flex: 1;"></div>
        <button id="btn-load" class="controls" style="background: #334155; border: 1px solid #475569; color: #e2e8f0; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap;">Load file</button>
      </div>
    </div>
  </div>

  <script type="module">
    import init, { TetrisReplay } from './pkg/engine_wasm.js';

    const CELL_SIZE = 28;
    const PIECE_COLORS = {
      I: '#00d4ff', O: '#ffd700', T: '#a855f7', S: '#22c55e',
      Z: '#ef4444', J: '#3b82f6', L: '#f97316',
    };
    const GHOST_ALPHA = 0.3;

    let replay = null;
    let playing = false;
    let playInterval = null;

    await init();

    // DOM elements
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const gameUI = document.getElementById('game-ui');
    const canvas = document.getElementById('board-canvas');
    const ctx = canvas.getContext('2d');
    const nextCanvas = document.getElementById('next-canvas');
    const nextCtx = nextCanvas.getContext('2d');
    const scrubber = document.getElementById('scrubber');
    const moveCounter = document.getElementById('move-counter');
    const scoreEl = document.getElementById('score');
    const linesEl = document.getElementById('lines');
    const statusEl = document.getElementById('status');
    const metadataEl = document.getElementById('metadata');
    const reasoningEl = document.getElementById('reasoning');
    const speedSelect = document.getElementById('speed');

    // File loading
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('active'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('active'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('active');
      const file = e.dataTransfer.files[0];
      if (file) loadFile(file);
    });
    fileInput.addEventListener('change', e => {
      if (e.target.files[0]) loadFile(e.target.files[0]);
    });

    function loadFile(file) {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          replay = new TetrisReplay(e.target.result);
          initUI();
        } catch (err) {
          alert('Failed to load game: ' + err.message);
        }
      };
      reader.readAsText(file);
    }

    function initUI() {
      dropZone.style.display = 'none';
      gameUI.style.display = 'block';

      const w = replay.board_width();
      const h = replay.board_height();
      canvas.width = w * CELL_SIZE;
      canvas.height = h * CELL_SIZE;

      scrubber.max = replay.total_moves();
      scrubber.value = 0;

      const meta = JSON.parse(replay.metadata_json());
      metadataEl.textContent = `Game ${meta.game_id.substring(0, 8)} | Seed: ${meta.seed} | ${meta.total_moves} moves`;

      render();
    }

    function render() {
      if (!replay) return;

      const w = replay.board_width();
      const h = replay.board_height();
      const cells = replay.board_cells();
      const pieceJson = replay.current_piece_json();
      const piece = JSON.parse(pieceJson);

      // Clear
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid lines
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 1;
      for (let x = 0; x <= w; x++) {
        ctx.beginPath();
        ctx.moveTo(x * CELL_SIZE, 0);
        ctx.lineTo(x * CELL_SIZE, h * CELL_SIZE);
        ctx.stroke();
      }
      for (let y = 0; y <= h; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * CELL_SIZE);
        ctx.lineTo(w * CELL_SIZE, y * CELL_SIZE);
        ctx.stroke();
      }

      // Locked cells
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const cell = cells[y * w + x];
          if (cell) {
            drawCell(ctx, x, y, PIECE_COLORS[cell]);
          }
        }
      }

      // Current piece
      if (piece && !replay.is_game_over()) {
        const pieceCells = getPieceCells(piece);
        for (const [px, py] of pieceCells) {
          if (py >= 0) drawCell(ctx, px, py, PIECE_COLORS[piece.piece_type]);
        }
      }

      // Update info
      scoreEl.textContent = replay.score().toString();
      linesEl.textContent = replay.lines_cleared().toString();
      moveCounter.textContent = `${replay.current_move()} / ${replay.total_moves()}`;
      scrubber.value = replay.current_move();
      statusEl.textContent = replay.is_game_over() ? 'Game Over' : `Move ${replay.current_move()}`;

      // Reasoning
      const reasoning = replay.current_reasoning();
      if (reasoning) {
        reasoningEl.textContent = reasoning;
        reasoningEl.classList.remove('empty');
      } else {
        reasoningEl.textContent = 'No reasoning recorded for this move.';
        reasoningEl.classList.add('empty');
      }

      // Next piece
      renderNextPiece(piece);
    }

    function drawCell(ctx, x, y, color) {
      const pad = 1;
      ctx.fillStyle = color;
      ctx.fillRect(x * CELL_SIZE + pad, y * CELL_SIZE + pad, CELL_SIZE - pad * 2, CELL_SIZE - pad * 2);
      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(x * CELL_SIZE + pad, y * CELL_SIZE + pad, CELL_SIZE - pad * 2, 3);
    }

    // SRS piece cells (matching engine) — used for rendering the active piece
    const PIECE_SHAPES = {
      I: { North: [[0,1],[1,1],[2,1],[3,1]], East: [[2,0],[2,1],[2,2],[2,3]], South: [[0,2],[1,2],[2,2],[3,2]], West: [[1,0],[1,1],[1,2],[1,3]] },
      O: { North: [[0,0],[1,0],[0,1],[1,1]], East: [[0,0],[1,0],[0,1],[1,1]], South: [[0,0],[1,0],[0,1],[1,1]], West: [[0,0],[1,0],[0,1],[1,1]] },
      T: { North: [[1,0],[0,1],[1,1],[2,1]], East: [[1,0],[1,1],[2,1],[1,2]], South: [[0,1],[1,1],[2,1],[1,2]], West: [[1,0],[0,1],[1,1],[1,2]] },
      S: { North: [[1,0],[2,0],[0,1],[1,1]], East: [[1,0],[1,1],[2,1],[2,2]], South: [[1,1],[2,1],[0,2],[1,2]], West: [[0,0],[0,1],[1,1],[1,2]] },
      Z: { North: [[0,0],[1,0],[1,1],[2,1]], East: [[2,0],[1,1],[2,1],[1,2]], South: [[0,1],[1,1],[1,2],[2,2]], West: [[1,0],[0,1],[1,1],[0,2]] },
      J: { North: [[0,0],[0,1],[1,1],[2,1]], East: [[1,0],[2,0],[1,1],[1,2]], South: [[0,1],[1,1],[2,1],[2,2]], West: [[1,0],[1,1],[0,2],[1,2]] },
      L: { North: [[2,0],[0,1],[1,1],[2,1]], East: [[1,0],[1,1],[1,2],[2,2]], South: [[0,1],[1,1],[2,1],[0,2]], West: [[0,0],[1,0],[1,1],[1,2]] },
    };

    function getPieceCells(piece) {
      const shape = PIECE_SHAPES[piece.piece_type]?.[piece.rotation];
      if (!shape) return [];
      return shape.map(([dx, dy]) => [piece.x + dx, piece.y + dy]);
    }

    function renderNextPiece(currentPiece) {
      nextCtx.fillStyle = '#1e293b';
      nextCtx.fillRect(0, 0, 80, 80);

      // Get next piece from state
      const state = JSON.parse(replay.state_json());
      const nextType = state.next_piece;
      if (!nextType) return;

      const shape = PIECE_SHAPES[nextType]?.North;
      if (!shape) return;

      const color = PIECE_COLORS[nextType];
      const cellSize = 18;
      const offsetX = (80 - 4 * cellSize) / 2;
      const offsetY = (80 - 2 * cellSize) / 2;

      for (const [dx, dy] of shape) {
        nextCtx.fillStyle = color;
        nextCtx.fillRect(offsetX + dx * cellSize + 1, offsetY + dy * cellSize + 1, cellSize - 2, cellSize - 2);
      }
    }

    let animating = false;

    // Animated step: if next action is HardDrop, animate the piece falling
    async function animatedStep() {
      if (!replay || animating) return false;

      const actionType = replay.next_action_type();
      if (!actionType) return false;

      if (actionType === 'HardDrop') {
        // Get piece position before the drop
        const pieceBefore = JSON.parse(replay.current_piece_json());
        const cellsBefore = replay.board_cells();

        // Execute the hard drop
        replay.step_forward();

        // Animate: render the piece dropping from old Y to the locked position
        const pieceAfter = JSON.parse(replay.current_piece_json());
        const stateAfter = JSON.parse(replay.state_json());

        // Find where the piece locked by looking at the move effect
        // We'll animate from pieceBefore.y down to the board
        const startY = pieceBefore.y;
        const w = replay.board_width();
        const h = replay.board_height();

        // Find the lowest valid Y for this piece shape
        const shape = PIECE_SHAPES[pieceBefore.piece_type]?.[pieceBefore.rotation] || [];
        let endY = startY;
        for (let testY = startY; testY < h; testY++) {
          const blocked = shape.some(([dx, dy]) => {
            const cx = pieceBefore.x + dx;
            const cy = testY + dy;
            if (cy >= h || cx < 0 || cx >= w) return true;
            return cellsBefore[cy * w + cx] !== null;
          });
          if (blocked) break;
          endY = testY;
        }

        // Animate over several frames
        const dropRows = endY - startY;
        if (dropRows > 0) {
          animating = true;
          const FRAMES_PER_ROW = 1;
          const FRAME_MS = 15;
          for (let row = 0; row <= dropRows; row++) {
            renderWithPieceAt(pieceBefore, startY + row, cellsBefore, w, h);
            await sleep(FRAME_MS);
          }
          animating = false;
        }

        render();
        return true;
      } else {
        replay.step_forward();
        render();
        return true;
      }
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function renderWithPieceAt(piece, y, cells, w, h) {
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid lines
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 1;
      for (let x = 0; x <= w; x++) { ctx.beginPath(); ctx.moveTo(x*CELL_SIZE,0); ctx.lineTo(x*CELL_SIZE,h*CELL_SIZE); ctx.stroke(); }
      for (let gy = 0; gy <= h; gy++) { ctx.beginPath(); ctx.moveTo(0,gy*CELL_SIZE); ctx.lineTo(w*CELL_SIZE,gy*CELL_SIZE); ctx.stroke(); }

      // Locked cells
      for (let cy = 0; cy < h; cy++) {
        for (let cx = 0; cx < w; cx++) {
          const cell = cells[cy * w + cx];
          if (cell) drawCell(ctx, cx, cy, PIECE_COLORS[cell]);
        }
      }

      // Piece at animated position
      const shape = PIECE_SHAPES[piece.piece_type]?.[piece.rotation] || [];
      for (const [dx, dy] of shape) {
        const px = piece.x + dx;
        const py = y + dy;
        if (py >= 0) drawCell(ctx, px, py, PIECE_COLORS[piece.piece_type]);
      }
    }

    // Controls
    document.getElementById('btn-reset').addEventListener('click', () => { stopPlay(); replay.reset(); render(); });
    document.getElementById('btn-prev').addEventListener('click', () => { stopPlay(); seekTo(replay.current_move() - 1); });
    document.getElementById('btn-next').addEventListener('click', () => { stopPlay(); animatedStep(); });
    document.getElementById('btn-end').addEventListener('click', () => { stopPlay(); replay.seek(replay.total_moves()); render(); });

    document.getElementById('btn-play').addEventListener('click', () => {
      if (playing) { stopPlay(); } else { startPlay(); }
    });

    scrubber.addEventListener('input', () => {
      stopPlay();
      seekTo(parseInt(scrubber.value));
    });

    function seekTo(move) {
      replay.seek(Math.max(0, move));
      render();
    }

    async function startPlay() {
      playing = true;
      document.getElementById('btn-play').textContent = 'Pause';

      while (playing) {
        const speed = parseInt(speedSelect.value);
        const ok = await animatedStep();
        if (!ok) { stopPlay(); return; }
        await sleep(speed);
      }
    }

    function stopPlay() {
      playing = false;
      document.getElementById('btn-play').textContent = 'Play';
    }

    speedSelect.addEventListener('change', () => {
      if (playing) { stopPlay(); startPlay(); }
    });

    // Load new file
    document.getElementById('btn-load').addEventListener('click', () => {
      stopPlay();
      fileInput.click();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if (!replay) return;
      switch (e.key) {
        case ' ': e.preventDefault(); document.getElementById('btn-play').click(); break;
        case 'ArrowRight': e.preventDefault(); document.getElementById('btn-next').click(); break;
        case 'ArrowLeft': e.preventDefault(); document.getElementById('btn-prev').click(); break;
        case 'Home': e.preventDefault(); document.getElementById('btn-reset').click(); break;
        case 'End': e.preventDefault(); document.getElementById('btn-end').click(); break;
      }
    });
  </script>
</body>
</html>
